<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Harrison's Math Flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="title-block">
        <h1>Harrison's Math Flashcards</h1>
        <p class="subtitle">Solve as fast as you can!</p>
      </div>
      <div class="top-bar-actions">
        <button
          class="stats-toggle"
          id="statsToggle"
          aria-label="Progress"
          aria-expanded="false"
          aria-controls="statsPanel"
          type="button"
        >
          <span class="stats-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <line x1="6" y1="20" x2="6" y2="13" />
              <line x1="12" y1="20" x2="12" y2="8" />
              <line x1="18" y1="20" x2="18" y2="4" />
            </svg>
          </span>
        </button>
        <button
          class="settings-toggle"
          id="settingsToggle"
          aria-label="Settings"
          aria-expanded="false"
          aria-controls="settingsPanel"
          type="button"
        >
          <span class="settings-toggle-icon" aria-hidden="true">⚙</span>
        </button>
      </div>
      <div class="settings-panel hidden" id="settingsPanel">
        <div class="controls">
          <label>
            <span>Min Answer</span>
            <input type="number" id="minValue" value="0" />
          </label>
          <label>
            <span>Max Answer</span>
            <input type="number" id="maxValue" value="30" />
          </label>
          <label>
            <span>Max × Operand</span>
            <input type="number" id="mulMaxOperand" value="12" min="2" />
          </label>
          <label>
            <span># of Questions</span>
            <input type="number" id="questionCount" value="30" />
          </label>
          <div class="ops">
            <label><input type="checkbox" id="opAdd" /> + Addition</label>
            <label><input type="checkbox" id="opSub" /> − Subtraction</label>
            <label><input type="checkbox" id="opMul" checked /> × Multiplication</label>
            <label><input type="checkbox" id="opDiv" /> ÷ Division</label>
          </div>
          <button type="button" id="resetStatsBtn" class="reset-stats">Reset trouble spots</button>
        </div>
      </div>
      <div class="stats-panel hidden" id="statsPanel">
        <div class="stats-panel-header">
          <h2 class="stats-panel-title">Your progress</h2>
          <button class="stats-close" id="statsClose" type="button" aria-label="Close">✕</button>
        </div>
        <div class="stats-panel-content" id="statsPanelContent"></div>
      </div>
    </header>

    <main class="main-content">
      <div class="card" id="card">
        <div class="problem" id="problemText">Click Start</div>
        <div class="answer-row hidden" id="answerRow">
          <input type="number" id="answerInput" />
        </div>
        <div class="status" id="statusText" aria-live="polite"></div>
      </div>

      <button id="startBtn" type="button">Start</button>

      <div class="summary hidden" id="summary"></div>
    </main>
  </div>

  <script src="scripts/logic.js"></script>
  <script src="scripts/stats.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
